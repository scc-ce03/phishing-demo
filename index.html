<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>セキュリティ体験</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h2>⚠ セキュリティ警告</h2>

    <p id="companyName"></p>

    <p>お使いのPCで問題が検出されました</p>

    <button class="button" onclick="countClick('support')">
        サポートに連絡
    </button>

</div>

<!-- 開始ポップアップ -->
<div id="popup" class="popup">
  <div class="popup-box">
    <h3>セキュリティ体験</h3>
    <p>実際のサポート詐欺を想定したセキュリティ体験を行います</p>
    <button onclick="start()">開始</button>
  </div>
</div>

<!-- タイマー -->
<div id="timerBox">
    <div id="closeBtn" onclick="fakeClose(event)">✕</div>
    <div id="timer">残り: 20秒</div>
</div>

<!-- 警告 -->
<div id="warningMessage"></div>

<script>

let clickCount = 0;
let supportClicks = 0;
let closeClicks = 0;
let timeLeft = 20;

// URLパラメータ
const params = new URLSearchParams(location.search);
const user = params.get("user") || "unknown";
const company = params.get("company") || "セキュリティ訓練";

document.getElementById("companyName").innerText =
    company + " システム監視センター";

// 開始
function start() {

    if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen();
    }

    document.getElementById("popup").style.display = "none";
    document.getElementById("timerBox").style.display = "block";
    document.body.style.cursor = "wait";

    startTimer();
}

// タイマー
function startTimer() {

    const timer = setInterval(() => {

        timeLeft--;

        document.getElementById("timer").innerText =
            "残り: " + timeLeft + "秒";

        if (timeLeft <= 0) {
            clearInterval(timer);
            end();
        }

    }, 1000);
}

// サポートボタン
function countClick(type) {

    clickCount++;

    if (type === "support") {
        supportClicks++;
    }

    showWarning("⚠ この操作は危険です！");
}

// 閉じる
function fakeClose(event) {

    event.preventDefault();

    clickCount++;
    closeClicks++;

    showWarning("⚠ セキュリティ保護が実行中です");
}

// 警告
function showWarning(message) {

    const msg = document.getElementById("warningMessage");
    msg.innerText = message;
    msg.style.display = "block";

    setTimeout(() => {
        msg.style.display = "none";
    }, 2000);
}

// 終了
function end() {

    sendToGoogleForm();

    document.body.style.cursor = "default";

    if (document.fullscreenElement) {
        document.exitFullscreen();
    }

    location.href =
        "thankyou.html"
        + "?count=" + clickCount
        + "&support=" + supportClicks
        + "&close=" + closeClicks
        + "&user=" + encodeURIComponent(user)
        + "&company=" + encodeURIComponent(company);
}

// ★修正版Googleフォーム送信（重要）
function sendToGoogleForm() {

    const url =
        "https://docs.google.com/forms/d/e/1FAIpQLSd4gqwmC5wCvN0CbHIAZ9qf2dla1ye6W6tW3vOHWrQ3ThNzcw/formResponse";

    const formData = new FormData();

    formData.append("entry.383079770", user);

    // 行動ログ（簡略化して安定優先）
    formData.append("entry.1264499515", supportClicks > 0 ? "気づいた" : "気づかない");
    formData.append("entry.418393278", closeClicks > 0 ? "操作あり" : "なし");
    formData.append("entry.267554255", String(clickCount));

    fetch(url, {
        method: "POST",
        mode: "no-cors",
        body: formData
    });
}

</script>

</body>
</html>
