<script>

const params = new URLSearchParams(location.search);

const count = params.get("count") || 0;
const user = params.get("user") || "unknown";

let message = "";

if (count == 0) {
    message = "素晴らしいです！危険な操作は行いませんでした。";
} else if (count == 1) {
    message = "1回クリックしました。注意が必要です。";
} else {
    message = count + "回クリックしています。非常に危険な状態です。";
}

document.getElementById("result").innerText = message;

//
// 初動対応分岐
//

document.querySelectorAll('input[name="initial"]').forEach(radio => {

    radio.addEventListener("change", function() {

        if (this.value === "いいえ") {
            document.getElementById("initialDetail").style.display = "block";
        } else {
            document.getElementById("initialDetail").style.display = "none";
        }

    });

});

//
// Googleフォーム送信
//

function sendForm() {

    //
    // 質問①
    //

    const mailReason =
        [...document.querySelectorAll('input[name="mailReason"]:checked')]
        .map(e =>
            "&entry.1264499515=" + encodeURIComponent(e.value)
        )
        .join("");

    //
    // 質問②
    //

    const siteReason =
        [...document.querySelectorAll('input[name="siteReason"]:checked')]
        .map(e =>
            "&entry.418393278=" + encodeURIComponent(e.value)
        )
        .join("");

    //
    // 質問③
    //

    const initial =
        document.querySelector('input[name="initial"]:checked')?.value || "";

    //
    // 質問③-2
    //

    const initialDetail =
        [...document.querySelectorAll('input[name="initialDetail"]:checked')]
        .map(e =>
            "&entry.457904848=" + encodeURIComponent(e.value)
        )
        .join("");

    //
    // GoogleフォームURL
    //

    const url =
        "https://docs.google.com/forms/d/e/1FAIpQLSd4gqwmC5wCvN0CbHIAZ9qf2dla1ye6W6tW3vOHWrQ3ThNzcw/formResponse"
        + "?entry.383079770=" + encodeURIComponent(user)
        + mailReason
        + siteReason
        + "&entry.1360374708=" + encodeURIComponent(initial)
        + initialDetail
        + "&entry.267554255=" + encodeURIComponent(count);

    //
    // 送信
    //

    new Image().src = url;

    //
    // メッセージ表示
    //

    document.getElementById("completeMessage").innerText =
        "アンケートを送信しました。";

    //
    // 再送信防止
    //

    document.getElementById("sendButton").disabled = true;

    document.getElementById("sendButton").innerText =
        "送信完了";

}

</script>
